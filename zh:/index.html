<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>盲盒相册</title>
  <link rel="icon" type="image/png" href="../blindboxicon.png" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <main class="page">
    <nav>
      <a class="brand" href="index.html">
        <img class="icon" src="../blindboxicon.png" alt="盲盒相册图标" />
        <span>盲盒相册</span>
      </a>
      <div class="nav-links">
        <a href="support.html">支持</a>
        <a href="privacy.html">隐私</a>
        <a class="lang" href="../index.html">English</a>
      </div>
    </nav>

    <section class="hero">
      <div>
        <div class="eyebrow">随机照片整理工具</div>
        <h1>重新翻开那些回忆。</h1>
        <p class="lead">
          盲盒相册用随机抽取和卡片式交互，帮你轻松整理相册。
          下一张照片是什么，你永远猜不到。
        </p>
        <div class="actions">
          <a class="button primary" href="support.html">获取支持</a>
          <a class="button secondary" href="privacy.html">隐私政策</a>
        </div>
      </div>

      <div class="visual">
        <img class="icon-large" src="../blindboxicon.png" alt="盲盒相册 App 图标" />
      </div>
    </section>

    <section class="cards">
      <div class="card">
        <h3>随机打开回忆</h3>
        <p>不用在相册里反复滑动，随机遇见那些很久没看到的照片。</p>
      </div>
      <div class="card">
        <h3>照片留在本地</h3>
        <p>照片仅在你的设备上处理，不会上传到服务器。</p>
      </div>
      <div class="card">
        <h3>删除前再次确认</h3>
        <p>先加入待删除，再统一确认，整理照片更安心。</p>
      </div>
    </section>

    <footer>© 2026 BlindBox. 独立开发。</footer>
  </main>
